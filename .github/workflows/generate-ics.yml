name: Generate Union ICS

on:
  schedule:
    - cron: '*/15 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate union.ics
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const SB_URL = 'xuxkeftsozygpejavood.supabase.co';
          const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGtlZnRzb3p5Z3BlamF2b29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMTQ0NTMsImV4cCI6MjA5NjY5MDQ1M30.DCjNfRpFvIGeFEZavgX_D02o_jfSLo2JmM6N7HwlmJc';

          const options = {
            hostname: SB_URL,
            path: '/rest/v1/app_data?id=eq.main&select=data',
            headers: {
              'apikey': SB_KEY,
              'Authorization': 'Bearer ' + SB_KEY
            }
          };

          https.get(options, res => {
            let body = '';
            res.on('data', chunk => body += chunk);
            res.on('end', () => {
              try {
                const rows = JSON.parse(body);
                const state = (rows && rows[0] && rows[0].data) ? rows[0].data : {};
                const sessions = (state.sessions || []).filter(s => s.type === 'union');
                const clients = state.unionClients || [];
                const now = new Date().toISOString().replace(/[-:.]/g,'').slice(0,15) + 'Z';

                let lines = [
                  'BEGIN:VCALENDAR',
                  'VERSION:2.0',
                  'PRODID:-//PT Manager//Union Calendar//IT',
                  'CALSCALE:GREGORIAN',
                  'METHOD:PUBLISH',
                  'X-WR-CALNAME:Lezioni Union',
                  'X-WR-CALDESC:Calendario lezioni Union',
                  'X-WR-TIMEZONE:Europe/Rome'
                ];

                sessions.forEach(s => {
                  const client = clients.find(c => c.id === s.unionClientId);
                  const name = client ? client.name : (s.unionName || 'Lezione Union');
                  const [sy, sm, sd] = s.date.split('-');
                  const [sh, smin] = s.startTime.split(':');
                  const [eh, emin] = s.endTime.split(':');
                  const dtstart = sy + sm + sd + 'T' + sh.padStart(2,'0') + smin.padStart(2,'0') + '00';
                  const dtend   = sy + sm + sd + 'T' + eh.padStart(2,'0') + emin.padStart(2,'0') + '00';
                  lines.push('BEGIN:VEVENT');
                  lines.push('UID:' + s.id + '@ptmanager-union');
                  lines.push('DTSTAMP:' + now);
                  lines.push('DTSTART;TZID=Europe/Rome:' + dtstart);
                  lines.push('DTEND;TZID=Europe/Rome:' + dtend);
                  lines.push('SUMMARY:Union - ' + name);
                  if (s.notes) lines.push('DESCRIPTION:' + s.notes);
                  lines.push('END:VEVENT');
                });

                lines.push('END:VCALENDAR');
                fs.writeFileSync('union.ics', lines.join('\r\n'));
                console.log('OK - ' + sessions.length + ' eventi Union generati');
              } catch(e) {
                console.error('Errore:', e.message);
                process.exit(1);
              }
            });
          }).on('error', e => {
            console.error('Errore rete:', e.message);
            process.exit(1);
          });
          EOF

      - name: Commit union.ics if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/balza00/pt-manager.git
          git add union.ics
          if git diff --cached --quiet; then
            echo "Nessuna modifica"
          else
            git commit -m "Update union.ics [skip ci]"
            git push
          fi
