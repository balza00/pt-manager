        </div>
        ${isFinished ? `<button class="btn btn-full" style="margin-top:12px;background:var(--purple-dim);color:var(--purple);border-color:rgba(167,139,250,0.3)" onclick="openRenewUnionPackage('${c.id}')"><i class="ti ti-refresh"></i> Rinnova pacchetto</button>` : ''}
      ` : `<div class="client-stat-row">
        <div class="client-stat"><div class="client-stat-label">Lezioni svolte</div><div class="client-stat-value">${done}</div></div>
        <div class="client-stat" style="display:flex;align-items:center;justify-content:center"><button class="btn btn-sm" onclick="openRenewUnionPackage('${c.id}')"><i class="ti ti-refresh"></i> Nuovo pacchetto</button></div>
      </div>`}
      ${paySection}
      <button class="btn btn-sm btn-full" style="margin-top:12px;background:var(--purple-dim);color:var(--purple);border-color:rgba(167,139,250,0.3)" onclick="openAddUnionSession('${c.id}')"><i class="ti ti-plus"></i> Aggiungi lezione</button>
    </div>`;
  }).join('');

  list.innerHTML = overview + cards;

  // Render classi
  const classesList = document.getElementById('union-classes-list');
  if (!classesList) return;
  const classSessions = state.sessions.filter(s => s.type==='class').sort((a,b)=>b.date.localeCompare(a.date));
  if (!classSessions.length) {
    classesList.innerHTML = `<div class="day-panel-empty" style="margin-bottom:10px"><i class="ti ti-users-group"></i>Nessuna classe ancora<br><span style="font-size:12px">Tocca "Nuova classe" per aggiungerne una</span></div>`;
    renderUnionRecap();
    return;
  }
  // Raggruppa per mese
  const byMonth = {};
  classSessions.forEach(s => {
    const key = s.date.slice(0,7);
    if (!byMonth[key]) byMonth[key] = [];
    byMonth[key].push(s);
  });
  const MONTHS_FULL = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  classesList.innerHTML = Object.keys(byMonth).sort((a,b)=>b.localeCompare(a)).map(key => {
    const [y,m] = key.split('-');
    const sessions = byMonth[key];
    const totale = sessions.reduce((s,x)=>s+(x.classPrice||0),0);
    const rows = sessions.map(s => `
      <div class="day-panel-item class" onclick="openEditSession('${s.id}')">
        <div class="day-panel-time">${s.startTime}<br><span class="t-end">${s.endTime}</span></div>
        <div class="day-panel-icon class"><i class="ti ti-users-group"></i></div>
        <div style="flex:1;min-width:0">
          <div class="day-panel-name">${s.className||'Classe'}</div>
          <div class="day-panel-type">${s.date}${s.classPrice?` · €${s.classPrice}`:''}</div>
        </div>
        <button class="btn btn-icon btn-sm btn-danger" onclick="event.stopPropagation();deleteSession('${s.id}')"><i class="ti ti-trash"></i></button>
      </div>`).join('');
    return `<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:14px;font-weight:700">${MONTHS_FULL[parseInt(m)-1]} ${y}</div>
        <div style="font-size:14px;font-weight:700;color:var(--green)">€${totale} · ${sessions.length} classi</div>
      </div>
      ${rows}
    </div>`;
  }).join('');
  renderUnionRecap();
}

function renderUnionRecap() {
  const recapEl = document.getElementById('union-recap');
  if (!recapEl) return;
  const MONTHS_FULL = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const unionSessions = state.sessions.filter(s => s.type === 'union');
  const classSessions = state.sessions.filter(s => s.type === 'class');
  if (!unionSessions.length && !classSessions.length) { recapEl.innerHTML = ''; return; }
  const byMonth = {};
  unionSessions.forEach(s => {
    const key = s.date.slice(0,7);
    if (!byMonth[key]) byMonth[key] = { union: [], class: [] };
    byMonth[key].union.push(s);
  });
  classSessions.forEach(s => {
    const key = s.date.slice(0,7);
    if (!byMonth[key]) byMonth[key] = { union: [], class: [] };
    byMonth[key].class.push(s);
  });
  const rows = Object.keys(byMonth).sort((a,b)=>b.localeCompare(a)).map(key => {
    const [y, m] = key.split('-');
    const u = byMonth[key].union;
    const c = byMonth[key].class;
    const totU = u.reduce((s,x)=>s+(x.unionPrice||0),0);
    const totC = c.reduce((s,x)=>s+(x.classPrice||0),0);
    return `<div style="background:var(--bg3);border-radius:12px;padding:13px 15px;margin-bottom:8px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px">${MONTHS_FULL[parseInt(m)-1]} ${y}</div>
      ${u.length ? `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0${c.length?';border-bottom:1px solid var(--border)':''}">
        <div style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:var(--purple);display:inline-block"></span><span style="font-size:13px;color:var(--text2)">Lezioni Union</span></div>
        <span style="font-size:13px;font-weight:700;color:var(--purple)">${u.length} lezioni${totU ? ' · €'+totU : ''}</span>
      </div>` : ''}
      ${c.length ? `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0">
        <div style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span><span style="font-size:13px;color:var(--text2)">Classi</span></div>
        <span style="font-size:13px;font-weight:700;color:var(--green)">${c.length} classi${totC ? ' · €'+totC : ''}</span>
      </div>` : ''}
    </div>`;
  }).join('');
  recapEl.innerHTML = `<div class="card" style="margin-top:16px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <i class="ti ti-calendar-stats" style="font-size:18px;color:var(--purple)"></i>
      <div style="font-size:15px;font-weight:700">Recap mensile</div>
    </div>
    ${rows}
  </div>`;
}

function openAddClassSession() {
  const todayStr = fmtDate(new Date());
  let hourOpts = '';
  for (let h=7;h<=21;h++) hourOpts+=`<option value="${h}"${h===9?' selected':''}>${String(h).padStart(2,'0')}</option>`;
  openSheet(`
    <h3>Nuova classe</h3>
    <div class="form-group"><label>Nome classe</label><input id="cl-name" type="text" placeholder="Es. Yoga, Pilates..."></div>
    <div class="form-group"><label>Data</label><input id="cl-date" type="date" value="${todayStr}"></div>
    <div class="form-group"><label>Orario inizio</label>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="cl-hour" style="flex:1">${hourOpts}</select>
        <span style="color:var(--text2);font-weight:600">:</span>
        <select id="cl-min" style="flex:1">
          <option value="0">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Durata</label><select id="cl-dur">
      <option value="30">30 min</option><option value="45">45 min</option><option value="60" selected>1 ora</option>
      <option value="90">1h 30min</option><option value="120">2 ore</option>
    </select></div>
    <div class="form-group"><label>Prezzo (€)</label><input id="cl-price" type="number" value="0" min="0"></div>
    <div class="form-group"><label>Note <span style="color:var(--text3)">(opzionale)</span></label><input id="cl-notes" type="text" placeholder="Opzionale"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-full" onclick="closeSheet()">Annulla</button>
      <button class="btn btn-accent btn-full" onclick="saveClassSession()"><i class="ti ti-plus"></i> Salva</button>
    </div>`);
}

function saveClassSession() {
  const date = document.getElementById('cl-date').value;
  if (!date) return alert('Seleziona la data');
  const h = document.getElementById('cl-hour').value;
  const m = document.getElementById('cl-min').value;
  const start = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const dur = document.getElementById('cl-dur').value;
  const session = {
    id: Date.now().toString(), date, startTime: start, endTime: endTime(start, dur),
    type: 'class',
    className: document.getElementById('cl-name').value || 'Classe',
    classPrice: parseFloat(document.getElementById('cl-price').value)||0,
    notes: document.getElementById('cl-notes').value
  };
  state.sessions.push(session);
  saveState(); closeSheet(); renderUnion(); renderCal();
  toast('Classe aggiunta ✓');
}

function openAddUnionClient() {
  openSheet(`
    <h3>Nuovo allievo Union</h3>
    <div class="form-group"><label>Nome completo</label><input id="uc-name" type="text" placeholder="Mario Rossi" autocomplete="name"></div>
    <div class="form-row-2">
      <div class="form-group"><label>€ / lezione</label><input id="uc-price" type="number" placeholder="30"></div>
      <div class="form-group"><label>Lezioni pacchetto <span style="color:var(--text3)">(0 = libero)</span></label><input id="uc-tot" type="number" value="10"></div>
    </div>
    <div class="form-group"><label>Lezioni già fatte prima di oggi</label><input id="uc-done" type="number" value="0" min="0"></div>
    <div class="form-group"><div class="checkbox-row"><input id="uc-paid" type="checkbox"><label for="uc-paid">Pacchetto già pagato</label></div></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-full" onclick="closeSheet()">Annulla</button>
      <button class="btn btn-full" style="background:var(--purple-dim);color:var(--purple);border-color:rgba(167,139,250,0.3);font-weight:500" onclick="saveUnionClient()">Salva</button>
    </div>`);
}

function editUnionClient(id) {
  const c = state.unionClients.find(x=>x.id===id); if (!c) return;
  openSheet(`
    <h3>Modifica allievo</h3>
    <div class="form-group"><label>Nome completo</label><input id="uc-name" type="text" value="${c.name}"></div>
    <div class="form-row-2">
      <div class="form-group"><label>€ / lezione</label><input id="uc-price" type="number" value="${c.pricePerSession||''}"></div>
      <div class="form-group"><label>Lezioni pacchetto</label><input id="uc-tot" type="number" value="${c.totalSessions||0}"></div>
    </div>
    <div class="form-group"><label>Lezioni già fatte (offset)</label><input id="uc-done" type="number" value="${c.startingSessions||0}" min="0"></div>
    <div class="form-group"><div class="checkbox-row"><input id="uc-paid" type="checkbox"${c.paid?' checked':''}><label for="uc-paid">Pacchetto già pagato</label></div></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-danger btn-icon" onclick="deleteUnionClient('${id}')"><i class="ti ti-trash"></i></button>
      <button class="btn btn-full" onclick="closeSheet()">Annulla</button>
      <button class="btn btn-full" style="background:var(--purple-dim);color:var(--purple);border-color:rgba(167,139,250,0.3);font-weight:500" onclick="saveUnionClient('${id}')">Aggiorna</button>
    </div>`);
}

function saveUnionClient(id) {
  const name = document.getElementById('uc-name').value.trim();
  if (!name) return alert('Inserisci il nome');
  if (!state.unionClients) state.unionClients = [];
  const existing = id ? state.unionClients.find(c=>c.id===id) : null;
  const client = {
    id: id||Date.now().toString(), name,
    pricePerSession: parseFloat(document.getElementById('uc-price').value)||0,
    totalSessions: parseInt(document.getElementById('uc-tot').value)||0,
    startingSessions: parseInt(document.getElementById('uc-done').value)||0,
    paid: document.getElementById('uc-paid').checked,
    pkg: existing ? (existing.pkg||0) : 0,
    payments: existing ? (existing.payments||[]) : []
  };
  if (id) { const i=state.unionClients.findIndex(c=>c.id===id); state.unionClients[i]=client; }
  else state.unionClients.push(client);
  saveState(); closeSheet(); renderUnion();
  toast(id ? 'Allievo aggiornato' : 'Allievo aggiunto ✓');
}

function deleteUnionClient(id) {
  if (!confirm('Eliminare questo allievo e tutte le sue lezioni?')) return;
  state.unionClients = state.unionClients.filter(c=>c.id!==id);
  state.sessions = state.sessions.filter(s=>!(s.type==='union'&&s.unionClientId===id));
  saveState(); closeSheet(); renderUnion();
  toast('Allievo eliminato');
}

function openRenewUnionPackage(id) {
  const c = state.unionClients.find(x=>x.id===id); if (!c) return;
  openSheet(`
    <h3>Rinnova pacchetto Union</h3>
    <div style="font-size:14px;color:var(--text2);margin-bottom:20px">${c.name} ha completato il pacchetto da ${c.totalSessions} lezioni.</div>
    <div class="form-group"><label>Lezioni nuovo pacchetto</label><input id="ru-sessions" type="number" value="${c.totalSessions}" min="1"></div>
    <div class="form-group"><div class="checkbox-row"><input id="ru-paid" type="checkbox"><label for="ru-paid">Già pagato</label></div></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-full" onclick="closeSheet()">Annulla</button>
      <button class="btn btn-full" style="background:var(--purple-dim);color:var(--purple);border-color:rgba(167,139,250,0.3);font-weight:500" onclick="renewUnionPackage('${id}')"><i class="ti ti-refresh"></i> Rinnova</button>
    </div>`);
}

function renewUnionPackage(id) {
  const c = state.unionClients.find(x=>x.id===id); if (!c) return;
  c.pkg = (c.pkg||0) + 1;
  c.startingSessions = 0;
  c.totalSessions = parseInt(document.getElementById('ru-sessions').value)||c.totalSessions;
  c.paid = document.getElementById('ru-paid').checked;
  c.payments = [];
  saveState(); closeSheet(); renderUnion();
  toast(`Pacchetto rinnovato! ${c.totalSessions} nuove lezioni ✓`);
}

function openUnionPayments(id) {
  const c = state.unionClients.find(x=>x.id===id); if (!c) return;
  const payments = c.payments||[];
  const totalPrice = (c.totalSessions||0)*(c.pricePerSession||0);
  const paidTotal = payments.reduce((s,p)=>s+p.amount,0);
  const remaining = Math.max(0, totalPrice - paidTotal);
  const rows = payments.length ? payments.map((p,i)=>`
    <div class="payment-row">
      <div><div style="font-size:14px">€${p.amount}</div><div style="font-size:12px;color:var(--text2)">${p.date}${p.note?' · '+p.note:''}</div></div>
      <button class="btn btn-icon btn-sm btn-danger" onclick="deleteUnionPayment('${id}',${i})"><i class="ti ti-trash"></i></button>
    </div>`).join('') : '<div style="font-size:13px;color:var(--text3);padding:12px 0">Nessun pagamento registrato.</div>';
  openSheet(`
    <h3>Pagamenti — ${c.name}</h3>
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <div class="metric" style="flex:1;padding:12px"><div class="metric-label">Totale</div><div style="font-size:18px;font-family:var(--mono)">€${totalPrice}</div></div>
      <div class="metric" style="flex:1;padding:12px"><div class="metric-label">Pagato</div><div style="font-size:18px;font-family:var(--mono);color:var(--green)">€${paidTotal}</div></div>
      <div class="metric" style="flex:1;padding:12px"><div class="metric-label">Resta</div><div style="font-size:18px;font-family:var(--mono);color:${remaining>0?'var(--red)':'var(--green)'}">€${remaining}</div></div>
    </div>
    <div style="margin-bottom:16px">${rows}</div>
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.4px">Aggiungi pagamento</div>
      <div class="form-row-2">
        <div class="form-group"><label>Importo (€)</label><input id="upay-amount" type="number" placeholder="${remaining>0?remaining:''}" min="1"></div>
        <div class="form-group"><label>Data</label><input id="upay-date" type="date" value="${new Date().toISOString().split('T')[0]}"></div>
      </div>
      <div class="form-group"><label>Nota (opzionale)</label><input id="upay-note" type="text" placeholder="Es. Acconto, Saldo..."></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-full" onclick="closeSheet()">Chiudi</button>
        <button class="btn btn-accent btn-full" onclick="addUnionPayment('${id}')"><i class="ti ti-plus"></i> Aggiungi</button>
      </div>
    </div>`);
}

function addUnionPayment(id) {
  const c = state.unionClients.find(x=>x.id===id); if (!c) return;
  const amount = parseFloat(document.getElementById('upay-amount').value);
  if (!amount||amount<=0) return alert('Inserisci un importo valido');
  if (!c.payments) c.payments = [];
  c.payments.push({ amount, date: document.getElementById('upay-date').value, note: document.getElementById('upay-note').value });
  saveState(); closeSheet(); renderUnion();
  toast(`Pagamento di €${amount} registrato ✓`);
}

function deleteUnionPayment(clientId, idx) {
  if (!confirm('Eliminare questo pagamento?')) return;
  const c = state.unionClients.find(x=>x.id===clientId); if (!c) return;
  c.payments.splice(idx,1);
  saveState(); closeSheet(); renderUnion(); toast('Pagamento eliminato');
}

function openAddUnionSession(clientId) {
  const c = state.unionClients.find(x=>x.id===clientId); if (!c) return;
  const todayStr = fmtDate(new Date());
  let hourOpts = '';
  for (let h=7;h<=21;h++) hourOpts+=`<option value="${h}"${h===9?' selected':''}>${String(h).padStart(2,'0')}</option>`;
  openSheet(`
    <h3>Nuova lezione — ${c.name}</h3>
    <div class="form-group"><label>Data</label><input id="ul-date" type="date" value="${todayStr}"></div>
    <div class="form-group"><label>Orario inizio</label>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="ul-hour" style="flex:1">${hourOpts}</select>
        <span style="color:var(--text2);font-weight:600">:</span>
        <select id="ul-min" style="flex:1">
          <option value="0">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Durata</label><select id="ul-dur">
      <option value="30">30 min</option><option value="45">45 min</option><option value="60" selected>1 ora</option>
      <option value="90">1h 30min</option><option value="120">2 ore</option>
    </select></div>
    <div class="form-group"><label>Note <span style="color:var(--text3)">(opzionale)</span></label><input id="ul-notes" type="text" placeholder="Es. ottima progressione..."></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-full" onclick="closeSheet()">Annulla</button>
      <button class="btn btn-full" style="background:var(--purple-dim);color:var(--purple);border-color:rgba(167,139,250,0.3);font-weight:500" onclick="saveUnionLesson('${clientId}')">Salva lezione</button>
    </div>`);
}

function saveUnionLesson(clientId) {
  const date = document.getElementById('ul-date').value;
  if (!date) return alert('Seleziona la data');
  const h = document.getElementById('ul-hour').value;
  const m = document.getElementById('ul-min').value;
  const start = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const dur = document.getElementById('ul-dur').value;
  const notes = document.getElementById('ul-notes').value;
  const c = state.unionClients.find(x=>x.id===clientId);
  const session = {
    id: Date.now().toString(), date, startTime: start, endTime: endTime(start, dur),
    type: 'union', unionClientId: clientId, pkg: c ? (c.pkg||0) : 0,
    unionName: c ? c.name : 'Union', unionPrice: c ? (c.pricePerSession||0) : 0, notes
  };
  state.sessions.push(session);
  saveState(); closeSheet(); renderUnion(); renderCal();
  toast('Lezione aggiunta ✓');
}

// ── AUTO UPDATE ──
let lastVersion = null;
async function checkForUpdate() {
  try {
    const res = await fetch('./version.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return;
    const data = await res.json();
    if (lastVersion === null) { lastVersion = data.v; return; }
    if (data.v !== lastVersion) { window.location.reload(); }
  } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkForUpdate();
});
setInterval(checkForUpdate, 2 * 60 * 1000);
checkForUpdate();

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

if (checkSession()) {
  loadState();
}
// If not authenticated, auth screen is shown and checkAuth() calls loadState() after login
</script>
</body>
</html>
